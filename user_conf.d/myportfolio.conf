map $request_method $timeline_post_limit_key {
	default "";
	POST $binary_remote_addr;
}

limit_req_zone $timeline_post_limit_key zone=timeline_post_limit:10m rate=1r/m;

server {
	listen 80;
	server_name rmoon.duckdns.org;
	return 301 https://rmoon.duckdns.org$request_uri;
}

server {
	listen 443 ssl;
	server_name rmoon.duckdns.org;

	location = /api/timeline_post {
		limit_req zone=timeline_post_limit;
		limit_req_status 429;
		proxy_pass http://myportfolio:5000/api/timeline_post;
	}

	location / {
		proxy_pass http://myportfolio:5000/;
	}

	# Load the certificate files.
	ssl_certificate /etc/letsencrypt/live/rmoon.duckdns.org/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/rmoon.duckdns.org/privkey.pem;
	ssl_trusted_certificate /etc/letsencrypt/live/rmoon.duckdns.org/chain.pem;
}
