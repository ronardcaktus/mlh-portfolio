<!DOCTYPE html>
<html lang="en">

{% from '_sections.html' import render_hobbies %}

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta property="og:title" content="My Hobbies - Personal Portfolio">
    <meta property="og:description" content="Explore my hobbies and interests">
    <meta property="og:url" content="{{ data.url }}">

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}" type='image/x-icon' />
    <title>Hobbies - {{ data.title }}</title>
</head>

<body>
    <!-- Navigation Bar -->
    <header class="nav-bar">
        <div class="nav-content">
            <a href="/">
                <div class="nav-logo">
                    <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="Logo" />
                </div>
            </a>
            <!-- Dynamic Menu Bar -->
            <nav class="nav-menu">
                {% for page in pages %}
                    <a href="{{ page.url }}" class="nav-link{% if page.url == '/hobbies' %} active{% endif %}">{{ page.name }}</a>
                {% endfor %}
            </nav>
        </div>
    </header>

    <!-- Page Header -->
    <section class="page-header">
        <div class="container">
            <h1>Hobbies & Interests</h1>
            <p class="header-subtitle">Discover what I'm passionate about</p>
        </div>
    </section>

    <!-- Hobbies Grid -->
    <section class="hobbies-detail-section">
        <div class="container">
            {{ render_hobbies(data.hobbies) }}
        </div>
    </section>

    <section class="back-section">
        <div class="container">
            <a href="/" class="back-link">← Back</a>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 {{ data.name }}. All rights reserved.</p>
        </div>
    </footer>
</body>

</html>
